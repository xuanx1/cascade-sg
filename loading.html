    <style>
      @font-face {
        font-family: 'Montserrat';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('fonts/montserrat-normal.woff2') format('woff2');
      }

      .loader {
        display: flex;
      }

      html.w-editor .loader {
        display: none;
      }

      .loader_logo {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 8rem;
        height: 8rem;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      @keyframes logoHueFlow {
        0%   { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }
      .loader_logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        animation: logoHueFlow 6s linear infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .loader_logo img { animation: none; }
      }

      .loader_typing {
        position: absolute;
        top: calc(50% + 5rem - 10px);
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Montserrat', sans-serif;
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
        pointer-events: none;
        color: #111;
        opacity: 0;
      }
      .loader_typing.is-active {
        opacity: 1;
      }
      .loader_typing_ghost {
        display: inline-block;
        visibility: hidden;
        margin-right: -0.18em;
      }
      .loader_typing_visible {
        position: absolute;
        top: 0;
        left: 0;
      }
      .loader_typing_caret {
        display: inline-block;
        width: 0.08em;
        height: 1em;
        margin-left: 0.06em;
        vertical-align: -0.08em;
        background: currentColor;
        animation: caretBlink 1.05s steps(2, jump-none) infinite;
      }
      @keyframes caretBlink {
        0%, 49%   { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .loader_typing_caret { animation: none; }
      }
    </style>

  <body>
    <div class="page-wrapper">
      <div class="global-styles">
        <div class="html w-embed">
          <style>
            a {
              color: inherit;
            }
          </style>
        </div>
      </div>
      <main class="main-wrapper">
        <div class="loader">
          <div class="trigger"></div>
          <div class="loader_top">
            <div class="loader_progress"></div>
          </div>
          <div class="loader_logo">
            <img src="./images/logo/cascade-color.png" alt="CASCADE" />
          </div>
          <div class="loader_typing" aria-hidden="true">
            <span class="loader_typing_ghost">CASCADE</span>
            <span class="loader_typing_visible">
              <span class="loader_typing_text"></span><span class="loader_typing_caret"></span>
            </span>
          </div>
        </div>
        <section class="section">
          <div class="container is-hero">
            <h1 class="hero_title">Data<br />Architect</h1>
          </div>
        </section>
      </main>
    </div>
    <script src="js/jquery.js" type="text/javascript"></script>
    <script src="js/page-loader-tricks.ca1b992ee.js" type="module"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/CustomEase.min.js"></script>
    <script>
      let customEase =
        "M0,0,C0,0,0.13,0.34,0.238,0.442,0.305,0.506,0.322,0.514,0.396,0.54,0.478,0.568,0.468,0.56,0.522,0.584,0.572,0.606,0.61,0.719,0.714,0.826,0.798,0.912,1,1,1,1";
      sessionStorage.setItem("visited", "true");

      function endLoaderAnimation() {
        $(".trigger").click();
        setTimeout(() => {
          $("body").fadeOut(1000, () => {
            window.location.href = "index.html";
          });
        }, 600);
      }

      const typingEl = document.querySelector(".loader_typing_text");
      const typingWrapper = document.querySelector(".loader_typing");
      if (typingEl && typingWrapper) {
        const word = "CASCADE";
        const reduceMotion =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        setTimeout(() => {
          typingWrapper.classList.add("is-active");
          if (reduceMotion) {
            typingEl.textContent = word;
            setTimeout(endLoaderAnimation, 500);
          } else {
            let i = 0;
            (function typeNext() {
              if (i >= word.length) {
                setTimeout(endLoaderAnimation, 500);
                return;
              }
              typingEl.textContent = word.slice(0, ++i);
              // human-feel jitter: ~54-98ms per keystroke, longer pause after vowels
              const base = 54 + Math.random() * 44;
              const extra = "AE".includes(word[i - 1]) ? 15 : 0;
              setTimeout(typeNext, base + extra);
            })();
          }
        }, 500);
      } else {
        setTimeout(endLoaderAnimation, 2000);
      }

      gsap.to(".loader_progress", {
        width: "100%",
        duration: 2,
        ease: CustomEase.create("custom", customEase),
      });
    </script>
  </body>
